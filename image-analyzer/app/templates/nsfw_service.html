<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>内容安全检测服务 - 图片分析系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
.topbar a{color:#e65100;text-decoration:none;font-size:.9em;display:flex;align-items:center;gap:5px}
.topbar a:hover{text-decoration:underline}
.topbar h1{margin-left:16px;font-size:1.05em;color:#111827;font-weight:600}
.main{display:flex;gap:18px;max-width:1280px;margin:20px auto;padding:0 16px;align-items:flex-start}
.sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:72px}
.content{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.panel{background:#fff;border-radius:12px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.panel-title{font-size:.82em;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
/* URL input */
.url-input-group{display:flex;flex-direction:column;gap:8px}
.url-input{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:8px;font-size:.9em;transition:border-color .2s;outline:none}
.url-input:focus{border-color:#e65100}
.url-input::placeholder{color:#c0c0c0}
/* strategy editor */
.strategy-area{width:100%;min-height:180px;padding:12px 14px;border:2px solid #e5e7eb;border-radius:8px;font-size:.82em;font-family:'SF Mono',Monaco,Consolas,'Courier New',monospace;line-height:1.6;resize:vertical;outline:none;background:#fafafa;color:#374151;tab-size:2}
.strategy-area:focus{border-color:#e65100;background:#fff}
/* quick templates */
.tpl-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.tpl-btn{padding:6px 14px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;font-size:.78em;color:#374151;cursor:pointer;transition:all .15s;font-weight:500}
.tpl-btn:hover{border-color:#e65100;color:#e65100;background:#fff3e0}
.tpl-btn.active{border-color:#e65100;background:#fff3e0;color:#e65100}
/* buttons */
.btn-row{margin-top:14px;display:flex;gap:10px}
.btn{padding:10px 24px;border-radius:8px;font-size:.9em;cursor:pointer;border:none;font-weight:500;transition:all .15s}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-primary{background:#e65100;color:#fff;flex:1}
.btn-primary:hover:not(:disabled){background:#bf360c}
.btn-clear{background:#fff;color:#6b7280;border:1px solid #d1d5db;padding:10px 16px}
.btn-clear:hover{background:#f9fafb}
/* loading */
.loading{display:none;text-align:center;padding:18px 0}
.loading.show{display:block}
.spinner{border:3px solid #e5e7eb;border-top:3px solid #e65100;border-radius:50%;width:26px;height:26px;animation:spin .7s linear infinite;margin:0 auto 6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#6b7280;font-size:.82em}
/* result card */
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-top:10px;animation:fadeIn .25s;font-size:.88em;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.rc-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.76em;font-weight:600;color:#fff}
.rc-badge.block{background:#dc2626}.rc-badge.review{background:#d97706}.rc-badge.pass{background:#16a34a}.rc-badge.error{background:#dc2626}
.rc-meta{font-size:.76em;color:#9ca3af;display:flex;gap:10px;flex-wrap:wrap}
/* score bars */
.score-section{margin-bottom:10px}
.score-section:last-child{margin-bottom:0}
.score-section-title{font-size:.76em;color:#9ca3af;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.score-row{display:flex;align-items:center;gap:6px;margin:5px 0}
.score-lbl{width:36px;font-size:.78em;color:#6b7280;text-align:right;flex-shrink:0}
.score-track{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .35s}
.score-fill.sf-porn{background:#dc2626}
.score-fill.sf-sexy{background:#f97316}
.score-fill.sf-normal{background:#16a34a}
.score-fill.ct-person{background:#8b5cf6}
.score-fill.ct-anime{background:#ec4899}
.score-fill.ct-scene{background:#3b82f6}
.score-fill.fusion{background:#7c3aed}
.score-val{width:50px;font-size:.76em;color:#6b7280;flex-shrink:0}
.rc-detail{font-size:.78em;color:#9ca3af;margin-top:6px}
/* raw json toggle */
.raw-toggle{font-size:.76em;color:#6b7280;cursor:pointer;background:none;border:1px solid #e5e7eb;border-radius:6px;padding:3px 10px;margin-top:6px}
.raw-toggle:hover{background:#f9fafb}
.raw-json{display:none;margin-top:8px;padding:12px;background:#1e1e1e;border-radius:8px;font-size:.78em;color:#d4d4d4;font-family:'SF Mono',Monaco,Consolas,monospace;line-height:1.6;overflow-x:auto;max-height:400px;white-space:pre-wrap;word-break:break-all}
.raw-json.show{display:block}
/* request json section */
.req-section{margin-top:10px;padding:12px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb}
.req-section-title{font-size:.78em;font-weight:600;color:#374151;margin-bottom:6px}
.req-json{padding:10px;background:#1e1e1e;border-radius:6px;font-size:.78em;color:#d4d4d4;font-family:'SF Mono',Monaco,Consolas,monospace;line-height:1.6;overflow-x:auto;max-height:200px;white-space:pre-wrap;word-break:break-all}
/* fusion sub results */
.fusion-section{margin-top:12px;padding:12px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb}
.fusion-section-title{font-size:.8em;font-weight:600;color:#374151;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fusion-section-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fusion-section-title .dot.fusion{background:#7c3aed}
.fusion-section-title .dot.model{background:#3b82f6}
.model-sub-result{padding:8px 0;border-bottom:1px solid #e5e7eb}
.model-sub-result:last-child{border-bottom:none}
.model-sub-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.model-sub-name{font-size:.8em;font-weight:500;color:#374151}
/* history */
.hist-header{display:flex;align-items:center;justify-content:space-between}
.hist-header button{font-size:.76em;color:#e65100;background:none;border:none;cursor:pointer}
/* info banner */
.info-banner{padding:12px 16px;border-radius:8px;background:#fff3e0;border:1px solid #ffe0b2;font-size:.82em;color:#e65100;line-height:1.6;margin-bottom:14px}
.info-banner strong{font-weight:600}
/* responsive */
@media(max-width:820px){
  .main{flex-direction:column}
  .sidebar{width:100%;position:static}
}
@media(max-width:520px){
  .main{padding:0 10px;margin:12px auto}
  .panel{padding:16px}
  .tpl-grid{flex-direction:column}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="/"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>首页</a>
  <h1>内容安全检测服务</h1>
</div>

<div class="main">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="panel">
      <div class="panel-title">图片地址</div>
      <div class="url-input-group">
        <input type="text" class="url-input" id="imgUrlInput" placeholder="输入图片 URL 地址，如 https://example.com/image.jpg">
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">模型参数策略</div>
      <div class="info-banner">
        <strong>说明：</strong>为空时默认使用 Falconsai ViT 模型的默认参数。<code>modelId</code> 设为 <code>"fusion"</code> 启用多模型融合检测。
      </div>
      <div class="tpl-grid">
        <button class="tpl-btn active" data-tpl="default" title="Falconsai ViT 默认参数">Falconsai 默认</button>
        <button class="tpl-btn" data-tpl="opennsfw2" title="OpenNSFW2 (Yahoo)">OpenNSFW2</button>
        <button class="tpl-btn" data-tpl="mobilenet" title="MobileNet V2 5分类">MobileNet</button>
        <button class="tpl-btn" data-tpl="fusion" title="多模型融合检测">融合模式</button>
        <button class="tpl-btn" data-tpl="empty" title="不传策略，使用默认">留空</button>
      </div>
      <textarea class="strategy-area" id="strategyInput" spellcheck="false" placeholder="JSON 格式的模型参数策略（可留空）"></textarea>
    </div>
  </div>

  <!-- RIGHT CONTENT -->
  <div class="content">
    <div class="panel">
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-primary" id="detectBtn">开始检测</button>
        <button class="btn btn-clear" id="clearBtn">清空</button>
      </div>
      <div class="loading" id="loading"><div class="spinner"></div><p>正在下载图片并执行模型推理，请稍候...</p></div>
    </div>

    <div class="panel" id="histPanel" style="display:none">
      <div class="hist-header">
        <div class="panel-title" style="margin-bottom:0">检测历史</div>
        <button id="clearHist">清空历史</button>
      </div>
      <div id="histList"></div>
    </div>
  </div>
</div>

<script>
(function(){
  // ---- 快捷模板 ----
  const TEMPLATES = {
    default: JSON.stringify({
      "modelId": "falconsai",
      "thresholds": {
        "nsfw_block": 0.8,
        "nsfw_review": 0.5
      }
    }, null, 2),
    opennsfw2: JSON.stringify({
      "modelId": "opennsfw2",
      "thresholds": {
        "nsfw_block": 0.8,
        "nsfw_review": 0.5
      }
    }, null, 2),
    mobilenet: JSON.stringify({
      "modelId": "mobilenet",
      "thresholds": {
        "porn": 0.6,
        "hentai": 0.5,
        "sexy": 0.7,
        "porn_hentai": 0.65
      }
    }, null, 2),
    fusion: JSON.stringify({
      "modelId": "fusion",
      "models": ["opennsfw2", "mobilenet", "falconsai"],
      "strategy": "weighted_average",
      "thresholds": {
        "mobilenet": {
          "porn": 0.6,
          "hentai": 0.5,
          "sexy": 0.7,
          "porn_hentai": 0.65
        },
        "opennsfw2": {
          "nsfw_block": 0.8,
          "nsfw_review": 0.5
        },
        "falconsai": {
          "nsfw_block": 0.8,
          "nsfw_review": 0.5
        }
      }
    }, null, 2),
    empty: ''
  };

  const urlInput = document.getElementById('imgUrlInput');
  const strategyInput = document.getElementById('strategyInput');
  const detectBtn = document.getElementById('detectBtn');
  const clearBtn = document.getElementById('clearBtn');
  const loadingEl = document.getElementById('loading');
  const histPanel = document.getElementById('histPanel');
  const histList = document.getElementById('histList');
  const clearHist = document.getElementById('clearHist');
  const tplBtns = document.querySelectorAll('.tpl-btn');

  // 初始模板
  strategyInput.value = TEMPLATES.default;

  // 模板切换
  tplBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tplBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      strategyInput.value = TEMPLATES[btn.dataset.tpl] || '';
    });
  });

  // 清空
  clearBtn.addEventListener('click', () => {
    urlInput.value = '';
    strategyInput.value = TEMPLATES.default;
    tplBtns.forEach(b => b.classList.remove('active'));
    tplBtns[0].classList.add('active');
  });

  // 清空历史
  clearHist.addEventListener('click', () => {
    histList.innerHTML = '';
    histPanel.style.display = 'none';
  });

  // ---- 检测 ----
  detectBtn.addEventListener('click', async () => {
    const imgUrl = urlInput.value.trim();
    if (!imgUrl) { alert('请输入图片 URL'); urlInput.focus(); return; }

    // 解析策略 JSON
    let modelStrategy = null;
    const strategyStr = strategyInput.value.trim();
    if (strategyStr) {
      try {
        modelStrategy = JSON.parse(strategyStr);
      } catch(e) {
        alert('模型参数策略 JSON 格式错误：' + e.message);
        strategyInput.focus();
        return;
      }
    }

    const requestBody = { imgUrl };
    if (modelStrategy) requestBody.modelStrategy = modelStrategy;

    detectBtn.disabled = true;
    loadingEl.classList.add('show');

    try {
      const resp = await fetch('/api/detect/nsfw/check', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody),
      });
      const data = await resp.json();
      renderResult(data, requestBody);
    } catch(e) {
      renderResult({ status: 'error', message: '请求失败: ' + e.message }, requestBody);
    } finally {
      detectBtn.disabled = false;
      loadingEl.classList.remove('show');
    }
  });

  // ---- 渲染结果 ----
  function renderResult(data, requestBody) {
    histPanel.style.display = '';
    const card = document.createElement('div');
    card.className = 'result-card';

    // 判断是融合还是单模型
    const isFusion = !!data.fusion;
    const action = isFusion ? (data.fusion.action || 'error') : (data.action || 'error');
    const actionText = isFusion ? (data.fusion.action_text || '错误') : (data.action_text || '错误');
    const status = data.status || 'error';

    let html = '';

    // ---- 头部：badge + meta ----
    html += '<div class="rc-head">';
    if (status === 'error') {
      html += '<span class="rc-badge error">错误</span>';
    } else {
      html += `<span class="rc-badge ${action}">${actionText}</span>`;
    }
    html += '<div class="rc-meta">';
    if (data.model) html += `<span>${data.model}</span>`;
    if (data.request_id) html += `<span>ID: ${data.request_id}</span>`;
    // 总耗时（优先毫秒，回退到秒）
    if (data.total_elapsed_ms != null) {
      html += `<span>总耗时 ${data.total_elapsed_ms}ms</span>`;
    } else if (data.total_elapsed_seconds != null) {
      html += `<span>总耗时 ${data.total_elapsed_seconds}s</span>`;
    } else if (data.elapsed_ms != null) {
      html += `<span>耗时 ${data.elapsed_ms}ms</span>`;
    } else if (data.elapsed_seconds != null) {
      html += `<span>耗时 ${data.elapsed_seconds}s</span>`;
    }
    // 下载 / 检测 分段耗时
    if (data.download_elapsed_ms != null) html += `<span>下载 ${data.download_elapsed_ms}ms</span>`;
    if (data.detect_elapsed_ms != null) html += `<span>检测 ${data.detect_elapsed_ms}ms</span>`;
    html += '</div></div>';

    // ---- 错误消息 ----
    if (status === 'error') {
      html += `<div style="color:#dc2626;font-size:.88em;padding:8px 0">${data.message || '未知错误'}</div>`;
    }

    // ---- 安全分类条形图 ----
    if (data.safety) {
      html += '<div class="score-section"><div class="score-section-title">安全分类</div>';
      const safetyMap = {'色情':'sf-porn','性感':'sf-sexy','正常':'sf-normal'};
      for (const [k, v] of Object.entries(data.safety)) {
        const pct = (v * 100).toFixed(1);
        const cls = safetyMap[k] || 'sf-normal';
        html += `<div class="score-row"><div class="score-lbl">${k}</div><div class="score-track"><div class="score-fill ${cls}" style="width:${pct}%"></div></div><div class="score-val">${pct}%</div></div>`;
      }
      html += '</div>';
    }

    // ---- 内容分类 ----
    if (data.content_type) {
      html += '<div class="score-section"><div class="score-section-title">内容分类</div>';
      const ctMap = {'人物':'ct-person','动漫':'ct-anime','风景':'ct-scene'};
      for (const [k, v] of Object.entries(data.content_type)) {
        const pct = (v * 100).toFixed(1);
        const cls = ctMap[k] || 'ct-scene';
        html += `<div class="score-row"><div class="score-lbl">${k}</div><div class="score-track"><div class="score-fill ${cls}" style="width:${pct}%"></div></div><div class="score-val">${pct}%</div></div>`;
      }
      html += '</div>';
    }

    // ---- 融合模式详情 ----
    if (isFusion && data.fusion) {
      const f = data.fusion;
      html += '<div class="fusion-section"><div class="fusion-section-title"><span class="dot fusion"></span>融合评分</div>';
      // 综合分数条
      const fPct = ((f.final_score || 0) * 100).toFixed(1);
      html += `<div class="score-row"><div class="score-lbl">综合</div><div class="score-track"><div class="score-fill fusion" style="width:${fPct}%"></div></div><div class="score-val">${fPct}%</div></div>`;
      if (f.final_porn != null) {
        const pp = (f.final_porn * 100).toFixed(1);
        html += `<div class="score-row"><div class="score-lbl">色情</div><div class="score-track"><div class="score-fill sf-porn" style="width:${pp}%"></div></div><div class="score-val">${pp}%</div></div>`;
      }
      if (f.final_sexy != null) {
        const sp = (f.final_sexy * 100).toFixed(1);
        html += `<div class="score-row"><div class="score-lbl">性感</div><div class="score-track"><div class="score-fill sf-sexy" style="width:${sp}%"></div></div><div class="score-val">${sp}%</div></div>`;
      }
      // 策略和详情
      html += `<div class="rc-detail">策略: ${f.strategy || '-'}</div>`;
      if (f.details && f.details.length) {
        html += `<div class="rc-detail">${f.details.join(' | ')}</div>`;
      }
      html += '</div>';

      // 各模型子结果
      if (data.model_results) {
        html += '<div class="fusion-section"><div class="fusion-section-title"><span class="dot model"></span>各模型结果</div>';
        for (const [mid, mr] of Object.entries(data.model_results)) {
          html += '<div class="model-sub-result">';
          html += '<div class="model-sub-head">';
          html += `<span class="model-sub-name">${mr.model || mid}</span>`;
          // 模型耗时（优先毫秒）
          const mMs = mr.elapsed_ms != null
            ? `${mr.elapsed_ms}ms`
            : (mr.elapsed_seconds != null ? `${mr.elapsed_seconds}s` : '');
          if (mMs) html += `<span style="font-size:.72em;color:#9ca3af;margin-left:auto;margin-right:8px">${mMs}</span>`;
          if (mr.action) html += `<span class="rc-badge ${mr.action}" style="font-size:.68em">${mr.action_text || mr.action}</span>`;
          html += '</div>';
          // 子模型安全分类
          if (mr.safety) {
            const safetyMap2 = {'色情':'sf-porn','性感':'sf-sexy','正常':'sf-normal'};
            for (const [k, v] of Object.entries(mr.safety)) {
              const pct = (v * 100).toFixed(1);
              const cls = safetyMap2[k] || 'sf-normal';
              html += `<div class="score-row"><div class="score-lbl">${k}</div><div class="score-track"><div class="score-fill ${cls}" style="width:${pct}%"></div></div><div class="score-val">${pct}%</div></div>`;
            }
          }
          html += '</div>';
        }
        html += '</div>';
      }
    }

    // ---- 详情 ----
    if (data.details && data.details.length && !isFusion) {
      html += `<div class="rc-detail">${data.details.join(' | ')}</div>`;
    }

    // ---- 请求 JSON ----
    const reqId = 'req_' + Date.now();
    html += `<div class="req-section"><div class="req-section-title">请求参数</div><div class="req-json">${escapeHtml(JSON.stringify(requestBody, null, 2))}</div></div>`;

    // ---- 响应 JSON 折叠 ----
    const rawId = 'raw_' + Date.now();
    html += `<button class="raw-toggle" onclick="var el=document.getElementById('${rawId}');el.classList.toggle('show');this.textContent=el.classList.contains('show')?'收起响应 JSON':'展开响应 JSON'">展开响应 JSON</button>`;
    html += `<div class="raw-json" id="${rawId}">${escapeHtml(JSON.stringify(data, null, 2))}</div>`;

    card.innerHTML = html;
    histList.insertBefore(card, histList.firstChild);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
})();
</script>
</body>
</html>
