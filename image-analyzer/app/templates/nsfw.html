<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>内容安全检测 - 图片分析系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
.topbar a{color:#dc2626;text-decoration:none;font-size:.9em;display:flex;align-items:center;gap:5px}
.topbar a:hover{text-decoration:underline}
.topbar h1{margin-left:16px;font-size:1.05em;color:#111827;font-weight:600}
/* layout */
.main{display:flex;gap:18px;max-width:1280px;margin:20px auto;padding:0 16px;align-items:flex-start}
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:72px}
.content{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.panel{background:#fff;border-radius:12px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.panel-title{font-size:.82em;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
/* fusion toggle */
.fusion-toggle{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 14px;border-radius:8px;background:#f9fafb;border:1px solid #e5e7eb}
.fusion-toggle .ft-label{font-size:.84em;color:#374151;font-weight:500}
.fusion-toggle .ft-desc{font-size:.72em;color:#9ca3af;margin-top:2px}
.switch{position:relative;width:40px;height:22px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:22px;transition:.2s}
.switch .slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked+.slider{background:#dc2626}
.switch input:checked+.slider:before{transform:translateX(18px)}
/* model cards */
.model-grid{display:flex;flex-direction:column;gap:10px}
.model-card{border:2px solid #e5e7eb;border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
.model-card:hover{border-color:#f87171}
.model-card.active{border-color:#dc2626;background:#fef2f2}
.model-card.checked{border-color:#dc2626;background:#fef2f2}
.model-card.unavailable{opacity:.45;cursor:not-allowed}
.model-card .mc-name{font-weight:600;font-size:.95em;color:#111827;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.model-card .mc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.mc-badge{font-size:.72em;padding:2px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
.mc-badge.acc{background:#dbeafe;color:#1d4ed8}
.mc-badge.spd{background:#d1fae5;color:#065f46}
.mc-badge.sz{background:#f3f4f6;color:#6b7280}
.mc-badge.out{background:#fef3c7;color:#92400e}
.model-card .mc-desc{font-size:.78em;color:#6b7280;line-height:1.5}
.mc-unavail{position:absolute;top:8px;right:10px;font-size:.7em;color:#dc2626;font-weight:500}
.mc-check{width:16px;height:16px;border-radius:4px;border:2px solid #d1d5db;display:none;flex-shrink:0;position:relative}
.fusion-mode .mc-check{display:inline-block}
.mc-check.on{background:#dc2626;border-color:#dc2626}
.mc-check.on::after{content:"";position:absolute;left:4px;top:1px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
/* threshold */
.th-group{margin-bottom:14px}
.th-group:last-child{margin-bottom:0}
.th-group label{display:flex;justify-content:space-between;align-items:center;font-size:.84em;color:#374151;margin-bottom:4px;font-weight:500}
.th-group label span{font-size:.82em;color:#9ca3af;font-weight:400}
.th-row{display:flex;align-items:center;gap:8px}
.th-row input[type=range]{flex:1;accent-color:#dc2626;height:6px}
.th-row .th-val{width:48px;text-align:center;font-size:.85em;color:#374151;font-weight:500;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:3px 0}
.th-reset{width:100%;margin-top:10px;padding:7px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#6b7280;font-size:.82em;cursor:pointer}
.th-reset:hover{background:#f9fafb}
.th-section-title{font-size:.78em;color:#6b7280;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f3f4f6}
/* upload */
.upload-area{border:2px dashed #d1d5db;border-radius:10px;padding:30px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fafafa}
.upload-area:hover,.upload-area.dragover{border-color:#dc2626;background:#fef2f2}
.upload-area svg{margin-bottom:6px;color:#9ca3af}
.upload-area p{color:#6b7280;font-size:.86em}
.upload-area p strong{color:#374151}
input[type="file"]{display:none}
.preview-bar{display:flex;align-items:center;gap:12px;margin-top:14px;padding:10px 12px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb}
.preview-bar img{width:56px;height:56px;border-radius:6px;object-fit:cover;border:1px solid #e5e7eb;flex-shrink:0}
.preview-bar .pi-info{flex:1;min-width:0;font-size:.84em;color:#374151;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-bar .pi-size{font-size:.78em;color:#9ca3af}
.preview-bar .pi-rm{background:none;border:none;color:#dc2626;cursor:pointer;font-size:.84em;flex-shrink:0;padding:4px 8px}
.btn-row{margin-top:14px;display:flex;gap:10px}
.btn{padding:9px 24px;border-radius:8px;font-size:.9em;cursor:pointer;border:none;font-weight:500;transition:opacity .15s}
.btn:disabled{opacity:.38;cursor:not-allowed}
.btn-primary{background:#dc2626;color:#fff;flex:1}
.btn-primary:hover:not(:disabled){background:#b91c1c}
/* loading */
.loading{display:none;text-align:center;padding:18px 0}
.loading.show{display:block}
.spinner{border:3px solid #e5e7eb;border-top:3px solid #dc2626;border-radius:50%;width:26px;height:26px;animation:spin .7s linear infinite;margin:0 auto 6px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#6b7280;font-size:.82em}
/* results */
.hist-header{display:flex;align-items:center;justify-content:space-between}
.hist-header button{font-size:.76em;color:#dc2626;background:none;border:none;cursor:pointer}
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px;margin-top:10px;animation:fadeIn .25s;font-size:.88em;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.rc-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.76em;font-weight:600;color:#fff}
.rc-badge.block{background:#dc2626}.rc-badge.review{background:#d97706}.rc-badge.pass{background:#16a34a}.rc-badge.error{background:#dc2626}
.rc-meta{font-size:.76em;color:#9ca3af;display:flex;gap:10px;flex-wrap:wrap}
.rc-redetect{font-size:.72em;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:3px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.rc-redetect:hover{color:#dc2626;border-color:#fca5a5;background:#fef2f2}
.rc-redetect:disabled{opacity:.5;cursor:not-allowed}
.rc-body{display:flex;gap:14px;align-items:flex-start}
.rc-thumb{width:72px;height:72px;border-radius:8px;object-fit:cover;border:1px solid #e5e7eb;flex-shrink:0}
.rc-scores{flex:1;min-width:0}
/* score bars */
.score-section{margin-bottom:10px}
.score-section:last-child{margin-bottom:0}
.score-section-title{font-size:.76em;color:#9ca3af;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.score-row{display:flex;align-items:center;gap:6px;margin:5px 0}
.score-lbl{width:36px;font-size:.78em;color:#6b7280;text-align:right;flex-shrink:0}
.score-track{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .35s}
.score-fill.sf-porn{background:#dc2626}
.score-fill.sf-sexy{background:#f97316}
.score-fill.sf-normal{background:#16a34a}
.score-fill.ct-person{background:#8b5cf6}
.score-fill.ct-anime{background:#ec4899}
.score-fill.ct-scene{background:#3b82f6}
.score-fill.fusion{background:#7c3aed}
.score-val{width:50px;font-size:.76em;color:#6b7280;flex-shrink:0}
.rc-detail{font-size:.78em;color:#9ca3af;margin-top:6px}
/* raw scores toggle */
.raw-toggle{font-size:.76em;color:#6b7280;cursor:pointer;background:none;border:1px solid #e5e7eb;border-radius:6px;padding:3px 10px;margin-top:6px}
.raw-toggle:hover{background:#f9fafb}
.raw-scores{display:none;margin-top:6px;padding:8px 10px;background:#f9fafb;border-radius:6px;font-size:.78em;color:#6b7280;line-height:1.8}
.raw-scores.show{display:block}
/* fusion result sections */
.fusion-section{margin-top:12px;padding:12px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb}
.fusion-section-title{font-size:.8em;font-weight:600;color:#374151;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fusion-section-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fusion-section-title .dot.fusion{background:#7c3aed}
.fusion-section-title .dot.model{background:#3b82f6}
.model-sub-result{padding:8px 0;border-bottom:1px solid #e5e7eb}
.model-sub-result:last-child{border-bottom:none}
.model-sub-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.model-sub-name{font-size:.8em;font-weight:500;color:#374151}
/* responsive */
@media(max-width:820px){
  .main{flex-direction:column}
  .sidebar{width:100%;position:static;flex-direction:row;flex-wrap:wrap;gap:14px}
  .sidebar>.panel{flex:1;min-width:240px}
}
@media(max-width:520px){
  .main{padding:0 10px;margin:12px auto}
  .panel{padding:16px}
  .sidebar{flex-direction:column}
  .sidebar>.panel{min-width:0}
  .model-grid{flex-direction:column}
  .rc-body{flex-direction:column}
  .rc-thumb{width:100%;height:120px}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="/"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>首页</a>
  <h1>内容安全检测</h1>
</div>

<div class="main">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="panel">
      <div class="fusion-toggle">
        <div>
          <div class="ft-label">融合模式</div>
          <div class="ft-desc">多模型综合评分，准确率更高</div>
        </div>
        <label class="switch"><input type="checkbox" id="fusionToggle"><span class="slider"></span></label>
      </div>
      <div class="panel-title">模型选择</div>
      <div class="model-grid" id="modelGrid"><!-- JS renders --></div>
    </div>
    <div class="panel" id="thresholdPanel">
      <div class="panel-title">分级阈值策略</div>
      <div id="thresholdContent"><!-- JS renders --></div>
      <button class="th-reset" id="thReset">恢复默认值</button>
    </div>
  </div>

  <!-- RIGHT CONTENT -->
  <div class="content">
    <div class="panel">
      <div class="upload-area" id="uploadArea">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p><strong>点击或拖拽上传图片</strong></p>
        <p>支持 PNG / JPG / JPEG / GIF / BMP / WEBP</p>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <div id="previewBar" style="display:none" class="preview-bar">
        <img id="prevImg">
        <div style="flex:1;min-width:0">
          <div class="pi-info" id="prevName"></div>
          <div class="pi-size" id="prevSize"></div>
        </div>
        <button class="pi-rm" id="prevRm">移除</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="detectBtn" disabled>开始检测</button>
      </div>
      <div class="loading" id="loading"><div class="spinner"></div><p>模型推理中，请稍候...</p></div>
    </div>

    <div class="panel" id="histPanel" style="display:none">
      <div class="hist-header">
        <div class="panel-title" style="margin-bottom:0">检测记录</div>
        <button id="clearHist">清空</button>
      </div>
      <div id="histList"></div>
    </div>
  </div>
</div>

<script>
/* ---- elements ---- */
const uploadArea=document.getElementById('uploadArea'),fileInput=document.getElementById('fileInput'),
      previewBar=document.getElementById('previewBar'),prevImg=document.getElementById('prevImg'),
      prevName=document.getElementById('prevName'),prevSize=document.getElementById('prevSize'),
      prevRm=document.getElementById('prevRm'),detectBtn=document.getElementById('detectBtn'),
      loading=document.getElementById('loading'),histPanel=document.getElementById('histPanel'),
      histList=document.getElementById('histList'),modelGrid=document.getElementById('modelGrid'),
      fusionToggle=document.getElementById('fusionToggle'),
      thresholdContent=document.getElementById('thresholdContent');

let file=null,thumbUrl='',selectedModel='mobilenet',defaults={};
let fusionMode=false,checkedModels=new Set(),allModels=[];

/* ---- threshold definitions per model type ---- */
const TH_MOBILENET=[
  {key:'porn',label:'Porn 色情',def:60},
  {key:'hentai',label:'Hentai 动漫色情',def:50},
  {key:'sexy',label:'Sexy 性感',def:70},
  {key:'porn_hentai',label:'Porn+Hentai 组合',def:65},
];
const TH_BINARY=[
  {key:'nsfw_block',label:'NSFW 拦截阈值',def:80},
  {key:'nsfw_review',label:'NSFW 复审阈值',def:50},
];

let currentThresholds={};

function renderThresholds(){
  const model=allModels.find(m=>m.id===selectedModel);
  const isMobilenet=model&&model.output==='5class';
  const defs=isMobilenet?TH_MOBILENET:TH_BINARY;
  const title=isMobilenet?'MobileNet 5-class 阈值':'二分类模型阈值';

  let html='<div class="th-section-title">'+title+'</div>';
  defs.forEach(d=>{
    const val=currentThresholds[d.key]!==undefined?currentThresholds[d.key]:d.def;
    html+=`<div class="th-group">
      <label>${d.label} <span id="thVal_${d.key}">${val}%</span></label>
      <div class="th-row">
        <input type="range" id="th_${d.key}" min="0" max="100" value="${val}" data-key="${d.key}">
        <div class="th-val" id="thNum_${d.key}">${val}%</div>
      </div>
    </div>`;
    currentThresholds[d.key]=val;
  });
  thresholdContent.innerHTML=html;

  // bind sliders
  thresholdContent.querySelectorAll('input[type=range]').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const k=sl.dataset.key;
      currentThresholds[k]=parseInt(sl.value);
      document.getElementById('thNum_'+k).textContent=sl.value+'%';
      const valEl=document.getElementById('thVal_'+k);
      if(valEl) valEl.textContent=sl.value+'%';
    });
  });
}

/* ---- fusion toggle ---- */
fusionToggle.addEventListener('change',()=>{
  fusionMode=fusionToggle.checked;
  renderModels();
});

/* ---- load config ---- */
fetch('/api/nsfw/config').then(r=>r.json()).then(d=>{
  defaults=d;
  Object.keys(d).forEach(k=>{
    currentThresholds[k]=Math.round(d[k]*100);
  });
  renderThresholds();
}).catch(()=>{});

document.getElementById('thReset').addEventListener('click',()=>{
  const model=allModels.find(m=>m.id===selectedModel);
  const isMobilenet=model&&model.output==='5class';
  const defs=isMobilenet?TH_MOBILENET:TH_BINARY;
  // 优先使用服务端默认值，回退到前端硬编码默认值
  defs.forEach(d=>{
    const serverVal=defaults[d.key]!==undefined?Math.round(defaults[d.key]*100):null;
    currentThresholds[d.key]=serverVal!==null?serverVal:d.def;
  });
  renderThresholds();
});

/* ---- load & render models ---- */
function renderModels(){
  modelGrid.innerHTML='';
  if(fusionMode) modelGrid.classList.add('fusion-mode');
  else modelGrid.classList.remove('fusion-mode');

  allModels.forEach(m=>{
    const card=document.createElement('div');
    const isActive=!fusionMode&&m.id===selectedModel;
    const isChecked=fusionMode&&checkedModels.has(m.id);
    card.className='model-card'+(isActive?' active':'')+(isChecked?' checked':'')+(m.available?'':' unavailable');
    card.dataset.id=m.id;
    const outLabel=m.output==='5class'?'5分类':'二分类';
    card.innerHTML=`
      <div class="mc-name"><span class="mc-check${isChecked?' on':''}"></span>${m.name}</div>
      <div class="mc-badges">
        <span class="mc-badge acc">精度: ${m.accuracy}</span>
        <span class="mc-badge spd">速度: ${m.speed}</span>
        <span class="mc-badge sz">${m.size}</span>
        <span class="mc-badge out">${outLabel}</span>
      </div>
      <div class="mc-desc">${m.desc}</div>
      ${m.available?'':'<span class="mc-unavail">未安装</span>'}`;
    if(m.available){
      card.addEventListener('click',()=>{
        if(fusionMode){
          if(checkedModels.has(m.id)) checkedModels.delete(m.id);
          else checkedModels.add(m.id);
          renderModels();
        }else{
          selectedModel=m.id;
          renderModels();
          renderThresholds();
        }
      });
    }
    modelGrid.appendChild(card);
  });
}

fetch('/api/nsfw/models').then(r=>r.json()).then(models=>{
  allModels=models;
  if(!models.find(x=>x.id===selectedModel&&x.available)){
    const first=models.find(x=>x.available);
    if(first) selectedModel=first.id;
  }
  models.forEach(m=>{if(m.available) checkedModels.add(m.id)});
  renderModels();
  renderThresholds();
}).catch(()=>{modelGrid.innerHTML='<div style="color:#9ca3af;font-size:.85em">加载模型列表失败</div>'});

/* ---- upload ---- */
uploadArea.addEventListener('click',()=>fileInput.click());
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');if(e.dataTransfer.files.length)setFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files.length)setFile(e.target.files[0]);fileInput.value=''});

function fmtSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1048576) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(2)+'MB';
}

function setFile(f){
  file=f;
  const reader=new FileReader();
  reader.onload=e=>{
    thumbUrl=e.target.result;
    prevImg.src=thumbUrl;
    prevName.textContent=f.name;
    prevSize.textContent=fmtSize(f.size);
    previewBar.style.display='flex';
    uploadArea.style.display='none';
    detectBtn.disabled=false;
  };
  reader.readAsDataURL(f);
}
function clearFile(){
  file=null;thumbUrl='';previewBar.style.display='none';uploadArea.style.display='';detectBtn.disabled=true;
}
prevRm.addEventListener('click',clearFile);

/* ---- detect ---- */
detectBtn.addEventListener('click',async()=>{
  if(!file) return;
  loading.classList.add('show');detectBtn.disabled=true;

  const curThumb=thumbUrl,curName=file.name,curSize=file.size;

  if(fusionMode){
    const fd=new FormData();
    fd.append('image',file);
    fd.append('models',[...checkedModels].join(','));
    // 追加当前阈值到 FormData，后端按模型类型分发
    ['porn','hentai','sexy','porn_hentai','nsfw_block','nsfw_review'].forEach(k=>{
      if(currentThresholds[k]!==undefined) fd.append('threshold_'+k,(currentThresholds[k]/100).toFixed(2));
    });
    try{
      const res=await fetch('/api/detect/nsfw/fusion',{method:'POST',body:fd});
      const data=await res.json();
      addFusionResult(data,curThumb,curName,curSize);
    }catch(err){
      addErrorResult(err.message,curThumb);
    }finally{
      loading.classList.remove('show');clearFile();
    }
  }else{
    const fd=new FormData();
    fd.append('image',file);
    fd.append('model_id',selectedModel);
    // send thresholds
    const model=allModels.find(m=>m.id===selectedModel);
    const isMobilenet=model&&model.output==='5class';
    const keys=isMobilenet?['porn','hentai','sexy','porn_hentai']:['nsfw_block','nsfw_review'];
    keys.forEach(k=>{
      if(currentThresholds[k]!==undefined){
        fd.append('threshold_'+k,(currentThresholds[k]/100).toFixed(2));
      }
    });
    try{
      const res=await fetch('/api/detect/nsfw',{method:'POST',body:fd});
      const data=await res.json();
      addResult(data,curThumb,curName,curSize);
    }catch(err){
      addErrorResult(err.message,curThumb);
    }finally{
      loading.classList.remove('show');clearFile();
    }
  }
});

/* ---- result rendering helpers ---- */
const actMap={block:'拦截',review:'复审',pass:'放行'};

function buildSafetyBars(safety){
  if(!safety) return '';
  const items=[
    {key:'色情',cls:'sf-porn'},
    {key:'性感',cls:'sf-sexy'},
    {key:'正常',cls:'sf-normal'},
  ];
  let html='<div class="score-section"><div class="score-section-title">安全分类</div>';
  items.forEach(it=>{
    const v=safety[it.key];
    if(v===undefined) return;
    const pct=(v*100).toFixed(2);
    html+=`<div class="score-row"><span class="score-lbl">${it.key}</span><div class="score-track"><div class="score-fill ${it.cls}" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;
  });
  html+='</div>';
  return html;
}

function buildContentBars(ct){
  if(!ct) return '';
  const items=[
    {key:'人物',cls:'ct-person'},
    {key:'动漫',cls:'ct-anime'},
    {key:'风景',cls:'ct-scene'},
  ];
  let html='<div class="score-section"><div class="score-section-title">内容分类</div>';
  items.forEach(it=>{
    const v=ct[it.key];
    if(v===undefined) return;
    const pct=(v*100).toFixed(2);
    html+=`<div class="score-row"><span class="score-lbl">${it.key}</span><div class="score-track"><div class="score-fill ${it.cls}" style="width:${pct}%"></div></div><span class="score-val">${pct}%</span></div>`;
  });
  html+='</div>';
  return html;
}

function buildRawScores(raw,id){
  if(!raw) return '';
  let entries=Object.entries(raw).map(([k,v])=>`${k}: ${(v*100).toFixed(2)}%`).join(' &nbsp;|&nbsp; ');
  return `<button class="raw-toggle" onclick="document.getElementById('${id}').classList.toggle('show')">原始分数</button><div class="raw-scores" id="${id}">${entries}</div>`;
}

let rawCounter=0;

function dataURLtoBlob(url){const a=url.split(','),m=a[0].match(/:(.*?);/)[1],b=atob(a[1]),u=new Uint8Array(b.length);for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return new Blob([u],{type:m})}

async function redetect(btn){
  const card=btn.closest('.result-card');
  const imgEl=card.querySelector('.rc-thumb');
  if(!imgEl||!imgEl.src) return;
  const src=imgEl.src;
  const blob=dataURLtoBlob(src);
  const f=new File([blob],'redetect.jpg',{type:blob.type});
  loading.classList.add('show');btn.disabled=true;
  try{
    if(fusionMode){
      const fd=new FormData();fd.append('image',f);fd.append('models',[...checkedModels].join(','));
      ['porn','hentai','sexy','porn_hentai','nsfw_block','nsfw_review'].forEach(k=>{
        if(currentThresholds[k]!==undefined) fd.append('threshold_'+k,(currentThresholds[k]/100).toFixed(2));
      });
      const res=await fetch('/api/detect/nsfw/fusion',{method:'POST',body:fd});
      const data=await res.json();addFusionResult(data,src,'redetect',blob.size);
    }else{
      const fd=new FormData();fd.append('image',f);fd.append('model_id',selectedModel);
      const model=allModels.find(m=>m.id===selectedModel);
      const isMobilenet=model&&model.output==='5class';
      const keys=isMobilenet?['porn','hentai','sexy','porn_hentai']:['nsfw_block','nsfw_review'];
      keys.forEach(k=>{if(currentThresholds[k]!==undefined) fd.append('threshold_'+k,(currentThresholds[k]/100).toFixed(2))});
      const res=await fetch('/api/detect/nsfw',{method:'POST',body:fd});
      const data=await res.json();addResult(data,src,'redetect',blob.size);
    }
  }catch(err){addErrorResult(err.message,src)}
  finally{loading.classList.remove('show');btn.disabled=false}
}

function addErrorResult(msg,thumb){
  histPanel.style.display='';
  const card=document.createElement('div');card.className='result-card';
  const now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  card.innerHTML=`<div class="rc-head"><span class="rc-badge error">失败</span><span class="rc-meta">${now}</span></div><div style="color:#6b7280">${msg}</div>`;
  histList.prepend(card);
}

function addResult(data,thumb,name,clientSize){
  histPanel.style.display='';
  const card=document.createElement('div');card.className='result-card';
  const now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  if(data.status==='error'){
    card.innerHTML=`<div class="rc-head"><span class="rc-badge error">失败</span><span class="rc-meta">${now}</span></div><div style="color:#6b7280">${data.message}</div>`;
    histList.prepend(card);return;
  }

  const act=data.action||'pass';
  const imgSize=data.image_size?fmtSize(data.image_size):fmtSize(clientSize);
  const rawId='raw_'+(rawCounter++);

  const safetyHtml=buildSafetyBars(data.safety);
  const contentHtml=data.content_type?buildContentBars(data.content_type):'';
  const rawHtml=buildRawScores(data.raw_scores,rawId);

  card.innerHTML=`
    <div class="rc-head">
      <div><span class="rc-badge ${act}">${actMap[act]||act}</span></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="rc-meta">
          <span>${data.model||''}</span>
          <span>${imgSize}</span>
          <span>${data.elapsed_seconds||''}s</span>
          <span>${now}</span>
        </div>
        <button class="rc-redetect" onclick="redetect(this)">&#x21bb; 重新检测</button>
      </div>
    </div>
    <div class="rc-body">
      <img class="rc-thumb" src="${thumb}">
      <div class="rc-scores">
        ${safetyHtml}
        ${contentHtml}
        ${rawHtml}
        ${data.details&&data.details.length?'<div class="rc-detail">'+data.details.join(' | ')+'</div>':''}
      </div>
    </div>`;
  histList.prepend(card);
}

function addFusionResult(data,thumb,name,clientSize){
  histPanel.style.display='';
  const card=document.createElement('div');card.className='result-card';
  const now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  if(data.status==='error'){
    card.innerHTML=`<div class="rc-head"><span class="rc-badge error">失败</span><span class="rc-meta">${now}</span></div><div style="color:#6b7280">${data.message||'融合检测失败'}</div>`;
    histList.prepend(card);return;
  }

  const fusion=data.fusion||{};
  const act=fusion.action||'pass';
  const finalScore=((fusion.final_score||0)*100).toFixed(2);

  // 融合安全分类
  const fusionSafetyHtml=buildSafetyBars(data.safety);
  // 内容分类（来自 MobileNet）
  const fusionContentHtml=data.content_type?buildContentBars(data.content_type):'';

  // 融合综合评分区
  let fusionHtml=`
    <div class="fusion-section">
      <div class="fusion-section-title"><span class="dot fusion"></span>融合综合评分 (${fusion.strategy||'weighted_average'})</div>
      ${fusionSafetyHtml}
      ${fusionContentHtml}
      ${fusion.details?'<div class="rc-detail">'+fusion.details.join(' | ')+'</div>':''}
    </div>`;

  // 各模型独立结果
  let modelsHtml='<div class="fusion-section"><div class="fusion-section-title"><span class="dot model"></span>各模型独立结果</div>';
  const modelResults=data.model_results||{};
  for(const [mid,mr] of Object.entries(modelResults)){
    const subRawId='raw_'+(rawCounter++);
    modelsHtml+='<div class="model-sub-result">';
    if(mr.status==='error'){
      modelsHtml+=`<div class="model-sub-head"><span class="model-sub-name">${mid}</span><span class="rc-badge error">失败</span></div><div style="font-size:.76em;color:#9ca3af">${mr.message||''}</div>`;
    }else{
      const mAct=mr.action||'pass';
      modelsHtml+=`<div class="model-sub-head"><span class="model-sub-name">${mr.model||mid}</span><span class="rc-badge ${mAct}">${actMap[mAct]}</span></div>`;
      modelsHtml+=buildSafetyBars(mr.safety);
      if(mr.content_type) modelsHtml+=buildContentBars(mr.content_type);
      modelsHtml+=buildRawScores(mr.raw_scores,subRawId);
      if(mr.elapsed_seconds) modelsHtml+=`<div style="font-size:.72em;color:#9ca3af;margin-top:2px">耗时: ${mr.elapsed_seconds}s</div>`;
    }
    modelsHtml+='</div>';
  }
  modelsHtml+='</div>';

  card.innerHTML=`
    <div class="rc-head">
      <div>
        <span class="rc-badge ${act}">${actMap[act]}</span>
        <span style="font-size:.78em;color:#7c3aed;font-weight:600;margin-left:6px">融合模式</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="rc-meta">
          <span>${data.elapsed_seconds||''}s</span>
          <span>${now}</span>
        </div>
        <button class="rc-redetect" onclick="redetect(this)">&#x21bb; 重新检测</button>
      </div>
    </div>
    <div class="rc-body">
      <img class="rc-thumb" src="${thumb}">
      <div class="rc-scores">
        ${fusionHtml}
        ${modelsHtml}
      </div>
    </div>`;
  histList.prepend(card);
}

document.getElementById('clearHist').addEventListener('click',()=>{histList.innerHTML='';histPanel.style.display='none'});
</script>
