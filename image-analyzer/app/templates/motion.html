<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>动态检测 - 图片分析系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 24px;height:52px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
.topbar a{color:#4f46e5;text-decoration:none;font-size:.9em;display:flex;align-items:center;gap:5px}
.topbar a:hover{text-decoration:underline}
.topbar h1{margin-left:16px;font-size:1.05em;color:#111827;font-weight:600}
/* layout */
.main{display:flex;gap:18px;max-width:1280px;margin:20px auto;padding:0 16px;align-items:flex-start}
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;position:sticky;top:72px}
.content{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px}
.panel{background:#fff;border-radius:12px;padding:20px 22px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.panel-title{font-size:.82em;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}
/* threshold / weight slider groups */
.th-group{margin-bottom:14px}
.th-group:last-child{margin-bottom:0}
.th-group label{display:flex;justify-content:space-between;align-items:center;font-size:.84em;color:#374151;margin-bottom:4px;font-weight:500}
.th-group label span{font-size:.82em;color:#9ca3af;font-weight:400}
.th-row{display:flex;align-items:center;gap:8px}
.th-row input[type=range]{flex:1;accent-color:#4f46e5;height:6px}
.th-row .th-val{width:48px;text-align:center;font-size:.85em;color:#374151;font-weight:500;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:3px 0}
.th-reset{width:100%;margin-top:10px;padding:7px;border-radius:7px;border:1px solid #d1d5db;background:#fff;color:#6b7280;font-size:.82em;cursor:pointer}
.th-reset:hover{background:#f9fafb}
.th-section-title{font-size:.78em;color:#6b7280;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #f3f4f6}
/* weight total indicator */
.weight-total{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:.82em;font-weight:500;text-align:center}
.weight-total.ok{background:#d1fae5;color:#065f46}
.weight-total.warn{background:#fef3c7;color:#92400e}
/* threshold zone indicator */
.zone-bar{display:flex;height:20px;border-radius:6px;overflow:hidden;margin-top:10px;font-size:.7em;font-weight:500;color:#fff;text-align:center;line-height:20px}
.zone-bar .z-pass{background:#16a34a}
.zone-bar .z-review{background:#eab308}
.zone-bar .z-mid{background:#ea580c}
.zone-bar .z-high{background:#dc2626}
/* upload */
.upload-area{border:2px dashed #d1d5db;border-radius:10px;padding:36px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:#fafafa}
.upload-area:hover,.upload-area.dragover{border-color:#4f46e5;background:#eef2ff}
.upload-area svg{margin-bottom:8px;color:#9ca3af}
.upload-area p{color:#6b7280;font-size:.9em}
.upload-area p strong{color:#374151}
input[type="file"]{display:none}
/* preview grid */
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,96px);gap:8px;margin-top:16px}
.preview-item{position:relative;width:96px;height:96px;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:13px;line-height:1;padding:0}
.file-count{font-size:.82em;color:#6b7280;margin-top:8px}
/* buttons */
.btn-row{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:9px 24px;border-radius:8px;font-size:.9em;cursor:pointer;border:none;font-weight:500;transition:opacity .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#4f46e5;color:#fff}
.btn-primary:hover:not(:disabled){background:#4338ca}
.btn-ghost{background:transparent;color:#6b7280;border:1px solid #d1d5db}
.btn-ghost:hover{background:#f9fafb}
/* loading */
.loading{display:none;text-align:center;padding:24px 0}
.loading.show{display:block}
.spinner{border:3px solid #e5e7eb;border-top:3px solid #4f46e5;border-radius:50%;width:28px;height:28px;animation:spin .7s linear infinite;margin:0 auto 8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:#6b7280;font-size:.85em}
/* result history */
.hist-header{display:flex;align-items:center;justify-content:space-between}
.hist-header button{font-size:.76em;color:#dc2626;background:none;border:none;cursor:pointer}
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px 20px;margin-top:10px;line-height:1.65;font-size:.9em;animation:fadeIn .25s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.result-card .rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rc-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.78em;font-weight:600;color:#fff}
.rc-badge.high_risk{background:#dc2626}
.rc-badge.mid_risk{background:#ea580c}
.rc-badge.review{background:#eab308;color:#422006}
.rc-badge.pass{background:#16a34a}
.rc-badge.error{background:#dc2626}
.rc-time{font-size:.78em;color:#9ca3af}
.rc-redetect{font-size:.72em;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:6px;padding:3px 10px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.rc-redetect:hover{color:#4f46e5;border-color:#a5b4fc;background:#eef2ff}
.rc-redetect:disabled{opacity:.5;cursor:not-allowed}
.rc-thumbs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.rc-thumbs img{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid #e5e7eb;cursor:pointer;transition:transform .15s}
.rc-thumbs img:hover{transform:scale(1.1)}
/* lightbox */
.lightbox-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center}
.lightbox-overlay.show{display:flex}
.lightbox-img{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain;user-select:none}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;line-height:1;padding:4px 8px;opacity:.8}
.lightbox-close:hover{opacity:1}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;cursor:pointer;padding:12px 14px;border-radius:50%;line-height:1;opacity:.7;transition:opacity .15s}
.lightbox-nav:hover{opacity:1;background:rgba(255,255,255,.25)}
.lightbox-nav.lb-prev{left:16px}
.lightbox-nav.lb-next{right:16px}
.lightbox-nav:disabled{opacity:.2;cursor:default}
.lightbox-counter{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:.85em}
/* score bars */
.score-section{margin-bottom:10px}
.score-section:last-child{margin-bottom:0}
.score-section-title{font-size:.76em;color:#9ca3af;font-weight:600;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.score-row{display:flex;align-items:center;gap:6px;margin:5px 0}
.score-lbl{width:46px;font-size:.78em;color:#6b7280;text-align:right;flex-shrink:0}
.score-track{flex:1;height:8px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;transition:width .35s}
.score-fill.sf-phash{background:#6366f1}
.score-fill.sf-ssim{background:#8b5cf6}
.score-fill.sf-flow{background:#a78bfa}
.score-fill.sf-fusion{background:#4f46e5}
.score-val{width:52px;font-size:.76em;color:#6b7280;flex-shrink:0}
.rc-detail{color:#374151;font-size:.82em;margin-top:6px}
.rc-detail span{color:#6b7280}
.elapsed{color:#9ca3af;font-size:.8em;margin-top:4px}
/* pair details toggle */
.pair-toggle{font-size:.76em;color:#6b7280;cursor:pointer;background:none;border:1px solid #e5e7eb;border-radius:6px;padding:3px 10px;margin-top:6px}
.pair-toggle:hover{background:#f9fafb}
.pair-details{display:none;margin-top:6px;padding:8px 10px;background:#f9fafb;border-radius:6px;font-size:.78em;color:#6b7280;line-height:1.8}
.pair-details.show{display:block}
/* responsive */
@media(max-width:820px){
  .main{flex-direction:column}
  .sidebar{width:100%;position:static;flex-direction:row;flex-wrap:wrap;gap:14px}
  .sidebar>.panel{flex:1;min-width:240px}
}
@media(max-width:520px){
  .main{padding:0 10px;margin:12px auto}
  .panel{padding:16px}
  .sidebar{flex-direction:column}
  .sidebar>.panel{min-width:0}
  .preview-grid{grid-template-columns:repeat(auto-fill,80px)}
  .preview-item{width:80px;height:80px}
}
</style>
</head>
<body>
<div class="topbar">
  <a href="/"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>首页</a>
  <h1>动态检测</h1>
</div>

<div class="main">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <!-- Panel 1: Weight Configuration -->
    <div class="panel">
      <div class="panel-title">评分权重配置</div>
      <div id="weightContent"></div>
      <div class="weight-total ok" id="weightTotal">合计: 100%</div>
      <button class="th-reset" id="weightReset">恢复默认值</button>
    </div>
    <!-- Panel 2: Threshold Configuration -->
    <div class="panel">
      <div class="panel-title">判定阈值配置</div>
      <div id="thresholdContent"></div>
      <div class="zone-bar" id="zoneBar">
        <div class="z-pass" style="flex:75">通过 &lt;75%</div>
        <div class="z-review" style="flex:10">复核</div>
        <div class="z-mid" style="flex:10">中风险</div>
        <div class="z-high" style="flex:5">&ge;95%</div>
      </div>
      <button class="th-reset" id="thReset">恢复默认值</button>
    </div>
  </div>

  <!-- RIGHT CONTENT -->
  <div class="content">
    <div class="panel">
      <div class="upload-area" id="uploadArea">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p><strong>点击或拖拽上传图片</strong></p>
        <p>支持单张追加或一次性多选，每次检测需要 2-6 张</p>
        <input type="file" id="fileInput" multiple accept="image/*">
      </div>
      <div class="preview-grid" id="previewGrid"></div>
      <div class="file-count" id="fileCount"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="detectBtn" disabled>开始检测</button>
        <button class="btn btn-ghost" id="clearBtn">清空</button>
      </div>
      <div class="loading" id="loading"><div class="spinner"></div><p>三维融合分析中...</p></div>
    </div>

    <!-- result history -->
    <div class="panel" id="histPanel" style="display:none">
      <div class="hist-header">
        <div class="panel-title" style="margin-bottom:0">检测记录</div>
        <button id="clearHistory">清空记录</button>
      </div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
/* ---- elements ---- */
const uploadArea=document.getElementById('uploadArea'),fileInput=document.getElementById('fileInput'),
      previewGrid=document.getElementById('previewGrid'),fileCount=document.getElementById('fileCount'),
      detectBtn=document.getElementById('detectBtn'),clearBtn=document.getElementById('clearBtn'),
      loading=document.getElementById('loading'),histPanel=document.getElementById('histPanel'),
      historyList=document.getElementById('historyList'),
      weightContent=document.getElementById('weightContent'),
      thresholdContent=document.getElementById('thresholdContent'),
      weightTotalEl=document.getElementById('weightTotal'),
      zoneBar=document.getElementById('zoneBar');

const MAX=6;
let files=[],thumbs=[];

/* ---- weight & threshold definitions ---- */
const WEIGHT_DEFS=[
  {key:'phash', label:'pHash 感知哈希', def:40},
  {key:'ssim',  label:'SSIM 结构相似度', def:35},
  {key:'flow',  label:'Flow 光流检测',   def:25},
];
const THRESHOLD_DEFS=[
  {key:'high_risk', label:'高风险阈值（>=此值为高风险挂播）', def:95},
  {key:'mid_risk',  label:'中风险阈值（>=此值为中风险挂播）', def:85},
  {key:'review',    label:'复核阈值（>=此值为人工复核）',     def:75},
];

let currentWeights={phash:40,ssim:35,flow:25};
let currentThresholds={high_risk:95,mid_risk:85,review:75};
let defaultWeights={...currentWeights};
let defaultThresholds={...currentThresholds};

/* ---- render weight sliders ---- */
function renderWeights(){
  let html='';
  WEIGHT_DEFS.forEach(d=>{
    const val=currentWeights[d.key];
    html+=`<div class="th-group">
      <label>${d.label} <span id="wVal_${d.key}">${val}%</span></label>
      <div class="th-row">
        <input type="range" id="w_${d.key}" min="0" max="100" value="${val}" data-key="${d.key}">
        <div class="th-val" id="wNum_${d.key}">${val}%</div>
      </div>
    </div>`;
  });
  weightContent.innerHTML=html;

  weightContent.querySelectorAll('input[type=range]').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const k=sl.dataset.key;
      currentWeights[k]=parseInt(sl.value);
      document.getElementById('wNum_'+k).textContent=sl.value+'%';
      const valEl=document.getElementById('wVal_'+k);
      if(valEl) valEl.textContent=sl.value+'%';
      updateWeightTotal();
    });
  });
  updateWeightTotal();
}

function updateWeightTotal(){
  const total=currentWeights.phash+currentWeights.ssim+currentWeights.flow;
  weightTotalEl.textContent='合计: '+total+'%';
  if(total===100){
    weightTotalEl.className='weight-total ok';
  }else{
    weightTotalEl.className='weight-total warn';
    weightTotalEl.textContent+=' (后端自动归一化)';
  }
}

/* ---- render threshold sliders ---- */
function renderThresholds(){
  let html='';
  THRESHOLD_DEFS.forEach(d=>{
    const val=currentThresholds[d.key];
    html+=`<div class="th-group">
      <label>${d.label} <span id="tVal_${d.key}">${val}%</span></label>
      <div class="th-row">
        <input type="range" id="t_${d.key}" min="0" max="100" value="${val}" data-key="${d.key}">
        <div class="th-val" id="tNum_${d.key}">${val}%</div>
      </div>
    </div>`;
  });
  thresholdContent.innerHTML=html;

  thresholdContent.querySelectorAll('input[type=range]').forEach(sl=>{
    sl.addEventListener('input',()=>{
      const k=sl.dataset.key;
      currentThresholds[k]=parseInt(sl.value);
      document.getElementById('tNum_'+k).textContent=sl.value+'%';
      const valEl=document.getElementById('tVal_'+k);
      if(valEl) valEl.textContent=sl.value+'%';
      updateZoneBar();
    });
  });
  updateZoneBar();
}

function updateZoneBar(){
  const h=currentThresholds.high_risk, m=currentThresholds.mid_risk, r=currentThresholds.review;
  const passW=Math.max(r,1);
  const reviewW=Math.max(m-r,0);
  const midW=Math.max(h-m,0);
  const highW=Math.max(100-h,1);
  zoneBar.innerHTML=
    `<div class="z-pass" style="flex:${passW}">通过 &lt;${r}%</div>`+
    (reviewW>0?`<div class="z-review" style="flex:${reviewW}">复核</div>`:'')+
    (midW>0?`<div class="z-mid" style="flex:${midW}">中风险</div>`:'')+
    `<div class="z-high" style="flex:${highW}">&ge;${h}%</div>`;
}

/* ---- load config from server ---- */
fetch('/api/motion/config').then(r=>r.json()).then(cfg=>{
  if(cfg.weights){
    defaultWeights={
      phash:Math.round(cfg.weights.phash*100),
      ssim:Math.round(cfg.weights.ssim*100),
      flow:Math.round(cfg.weights.flow*100),
    };
    currentWeights={...defaultWeights};
  }
  if(cfg.thresholds){
    defaultThresholds={
      high_risk:Math.round(cfg.thresholds.high_risk*100),
      mid_risk:Math.round(cfg.thresholds.mid_risk*100),
      review:Math.round(cfg.thresholds.review*100),
    };
    currentThresholds={...defaultThresholds};
  }
  renderWeights();
  renderThresholds();
}).catch(()=>{
  renderWeights();
  renderThresholds();
});

/* ---- reset buttons ---- */
document.getElementById('weightReset').addEventListener('click',()=>{
  currentWeights={...defaultWeights};
  renderWeights();
});
document.getElementById('thReset').addEventListener('click',()=>{
  currentThresholds={...defaultThresholds};
  renderThresholds();
});

/* ---- upload logic ---- */
uploadArea.addEventListener('click',()=>fileInput.click());
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');addFiles(e.dataTransfer.files)});
fileInput.addEventListener('change',e=>{addFiles(e.target.files);fileInput.value=''});

function addFiles(newFiles){
  const arr=Array.from(newFiles).filter(f=>f.type.startsWith('image/'));
  const space=MAX-files.length;
  if(space<=0) return;
  const toAdd=arr.slice(0,space);
  toAdd.forEach(f=>{
    files.push(f);
    const reader=new FileReader();
    reader.onload=e=>{thumbs.push(e.target.result);renderPreview()};
    reader.readAsDataURL(f);
  });
  renderPreview();
}

function renderPreview(){
  previewGrid.innerHTML='';
  files.forEach((_,i)=>{
    const src=thumbs[i]||'';
    if(!src) return;
    const d=document.createElement('div');d.className='preview-item';
    d.innerHTML=`<img src="${src}"><button class="rm" data-i="${i}">&#215;</button>`;
    previewGrid.appendChild(d);
  });
  previewGrid.querySelectorAll('.rm').forEach(b=>b.onclick=()=>removeFile(+b.dataset.i));
  fileCount.textContent=files.length?`已选 ${files.length} / ${MAX} 张`+(files.length<2?' (至少需要 2 张)':''):'';
  detectBtn.disabled=files.length<2;
}

function removeFile(i){files.splice(i,1);thumbs.splice(i,1);renderPreview()}
clearBtn.addEventListener('click',()=>{files=[];thumbs=[];renderPreview()});

/* ---- detect ---- */
detectBtn.addEventListener('click',async()=>{
  if(!files.length) return;
  if(files.length<2){
    addHistory({status:'error',message:'至少需要 2 张图片才能检测动静态，请继续添加图片'},[...thumbs]);
    return;
  }
  loading.classList.add('show');detectBtn.disabled=true;

  const fd=new FormData();
  files.forEach(f=>fd.append('images',f));

  // 追加权重参数
  fd.append('weight_phash',(currentWeights.phash/100).toFixed(2));
  fd.append('weight_ssim',(currentWeights.ssim/100).toFixed(2));
  fd.append('weight_flow',(currentWeights.flow/100).toFixed(2));

  // 追加阈值参数
  fd.append('threshold_high_risk',(currentThresholds.high_risk/100).toFixed(2));
  fd.append('threshold_mid_risk',(currentThresholds.mid_risk/100).toFixed(2));
  fd.append('threshold_review',(currentThresholds.review/100).toFixed(2));

  const curThumbs=[...thumbs];
  try{
    const res=await fetch('/api/detect/motion',{method:'POST',body:fd});
    const data=await res.json();
    addHistory(data,curThumbs);
  }catch(err){
    addHistory({status:'error',message:err.message},curThumbs);
  }finally{
    loading.classList.remove('show');
    files=[];thumbs=[];renderPreview();
  }
});

/* ---- result rendering ---- */
const resultTextMap={high_risk:'高风险挂播',mid_risk:'中风险挂播',review:'人工复核',pass:'通过'};
let pairCounter=0;

function dataURLtoBlob(url){
  const a=url.split(','),m=a[0].match(/:(.*?);/)[1],b=atob(a[1]),u=new Uint8Array(b.length);
  for(let i=0;i<b.length;i++) u[i]=b.charCodeAt(i);
  return new Blob([u],{type:m});
}

async function redetect(btn){
  const card=btn.closest('.result-card');
  const imgs=card.querySelectorAll('.rc-thumbs img');
  if(!imgs.length||imgs.length<2) return;

  loading.classList.add('show');btn.disabled=true;

  const fd=new FormData();
  const curThumbs=[];
  imgs.forEach((img,i)=>{
    const src=img.src;
    curThumbs.push(src);
    const blob=dataURLtoBlob(src);
    fd.append('images',new File([blob],`redetect_${i}.jpg`,{type:blob.type}));
  });

  // 使用当前左侧面板的策略参数
  fd.append('weight_phash',(currentWeights.phash/100).toFixed(2));
  fd.append('weight_ssim',(currentWeights.ssim/100).toFixed(2));
  fd.append('weight_flow',(currentWeights.flow/100).toFixed(2));
  fd.append('threshold_high_risk',(currentThresholds.high_risk/100).toFixed(2));
  fd.append('threshold_mid_risk',(currentThresholds.mid_risk/100).toFixed(2));
  fd.append('threshold_review',(currentThresholds.review/100).toFixed(2));

  try{
    const res=await fetch('/api/detect/motion',{method:'POST',body:fd});
    const data=await res.json();
    addHistory(data,curThumbs);
  }catch(err){
    addHistory({status:'error',message:err.message},curThumbs);
  }finally{
    loading.classList.remove('show');btn.disabled=false;
  }
}

function buildScoreBar(label, value, cls){
  if(value===undefined||value===null) return '';
  const pct=(value*100).toFixed(2);
  return `<div class="score-row">
    <span class="score-lbl">${label}</span>
    <div class="score-track"><div class="score-fill ${cls}" style="width:${pct}%"></div></div>
    <span class="score-val">${pct}%</span>
  </div>`;
}

function buildPairDetails(pairData, id){
  if(!pairData) return '';
  const methods=['phash','ssim','flow'];
  const labels={phash:'pHash',ssim:'SSIM',flow:'Flow'};
  let hasData=false;
  let content='';
  methods.forEach(m=>{
    const pairs=pairData[m];
    if(pairs&&pairs.length){
      hasData=true;
      content+=`<div><strong>${labels[m]}:</strong> `+pairs.map((s,i)=>`图${i+1}→${i+2}: ${(s*100).toFixed(1)}%`).join(' &emsp;')+'</div>';
    }
  });
  if(!hasData) return '';
  return `<button class="pair-toggle" onclick="document.getElementById('${id}').classList.toggle('show')">逐对详情</button><div class="pair-details" id="${id}">${content}</div>`;
}

function addHistory(data,previews){
  histPanel.style.display='';
  const card=document.createElement('div');card.className='result-card';
  const now=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  if(data.status==='error'){
    card.innerHTML=`<div class="rc-head"><span class="rc-badge error">失败</span><span class="rc-time">${now}</span></div><div class="rc-detail">${data.message}</div>`;
    historyList.prepend(card);
    return;
  }

  const result=data.result||'static';
  const badgeCls=result;
  const badgeText=resultTextMap[result]||result;

  let thumbsHtml='<div class="rc-thumbs">'+previews.map(s=>`<img src="${s}">`).join('')+'</div>';

  // 各方法评分
  const scores=data.scores||{};
  let methodBars='';
  if(scores.phash!==undefined) methodBars+=buildScoreBar('pHash',scores.phash,'sf-phash');
  if(scores.ssim!==undefined) methodBars+=buildScoreBar('SSIM',scores.ssim,'sf-ssim');
  if(scores.flow!==undefined) methodBars+=buildScoreBar('Flow',scores.flow,'sf-flow');

  // 融合评分
  let fusionBar=buildScoreBar('融合',data.fusion_score,'sf-fusion');

  // 权重和阈值信息
  const wu=data.weights_used||{};
  const tu=data.thresholds_used||{};
  let detailText='';
  if(wu.phash!==undefined) detailText+=`<span>权重:</span> pHash ${(wu.phash*100).toFixed(0)}% / SSIM ${(wu.ssim*100).toFixed(0)}% / Flow ${(wu.flow*100).toFixed(0)}%`;
  if(tu.high_risk!==undefined) detailText+=` &emsp;<span>阈值:</span> 高风险>=${(tu.high_risk*100).toFixed(0)}% / 中风险>=${(tu.mid_risk*100).toFixed(0)}% / 复核>=${(tu.review*100).toFixed(0)}%`;

  const pairId='pair_'+(pairCounter++);
  const pairHtml=buildPairDetails(data.pair_details,pairId);

  card.innerHTML=`
    <div class="rc-head">
      <span class="rc-badge ${badgeCls}">${badgeText}</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="rc-time">${now}</span>
        <button class="rc-redetect" onclick="redetect(this)">&#x21bb; 重新检测</button>
      </div>
    </div>
    ${thumbsHtml}
    <div class="rc-scores">
      <div class="score-section">
        <div class="score-section-title">各方法评分</div>
        ${methodBars}
      </div>
      <div class="score-section">
        <div class="score-section-title">融合评分</div>
        ${fusionBar}
      </div>
    </div>
    ${detailText?'<div class="rc-detail">'+detailText+'</div>':''}
    ${pairHtml}
    ${data.elapsed_seconds!==undefined?`<div class="elapsed">耗时 ${data.elapsed_seconds}s</div>`:''}`;

  historyList.prepend(card);
}

document.getElementById('clearHistory').addEventListener('click',()=>{historyList.innerHTML='';histPanel.style.display='none'});
</script>

<!-- Lightbox -->
<div class="lightbox-overlay" id="lightbox">
  <button class="lightbox-close" id="lbClose">&times;</button>
  <button class="lightbox-nav lb-prev" id="lbPrev">&#8249;</button>
  <img class="lightbox-img" id="lbImg">
  <button class="lightbox-nav lb-next" id="lbNext">&#8250;</button>
  <div class="lightbox-counter" id="lbCounter"></div>
</div>
<script>
(function(){
  const overlay=document.getElementById('lightbox'),lbImg=document.getElementById('lbImg'),
        lbPrev=document.getElementById('lbPrev'),lbNext=document.getElementById('lbNext'),
        lbCounter=document.getElementById('lbCounter');
  let imgs=[],idx=0;

  function show(srcs,i){
    imgs=srcs;idx=i;update();
    overlay.classList.add('show');
  }
  function hide(){overlay.classList.remove('show');imgs=[];idx=0;}
  function update(){
    lbImg.src=imgs[idx];
    lbPrev.disabled=idx<=0;
    lbNext.disabled=idx>=imgs.length-1;
    lbCounter.textContent=imgs.length>1?(idx+1)+' / '+imgs.length:'';
  }
  lbPrev.onclick=()=>{if(idx>0){idx--;update()}};
  lbNext.onclick=()=>{if(idx<imgs.length-1){idx++;update()}};
  document.getElementById('lbClose').onclick=hide;
  overlay.addEventListener('click',e=>{if(e.target===overlay)hide()});
  document.addEventListener('keydown',e=>{
    if(!overlay.classList.contains('show'))return;
    if(e.key==='Escape')hide();
    else if(e.key==='ArrowLeft'&&idx>0){idx--;update()}
    else if(e.key==='ArrowRight'&&idx<imgs.length-1){idx++;update()}
  });

  document.addEventListener('click',e=>{
    const img=e.target;
    if(!img.matches('.rc-thumbs img'))return;
    const container=img.closest('.rc-thumbs');
    const allImgs=Array.from(container.querySelectorAll('img'));
    const srcs=allImgs.map(i=>i.src);
    const clickIdx=allImgs.indexOf(img);
    show(srcs,clickIdx>=0?clickIdx:0);
  });
})();
</script>
