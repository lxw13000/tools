<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>图片分析系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.header{text-align:center;margin-bottom:44px}
.header h1{font-size:1.8em;color:#111827;font-weight:700}
.header p{color:#6b7280;margin-top:8px;font-size:.95em}
.nav-list{display:flex;flex-direction:column;gap:20px;width:100%;max-width:560px}
.nav-card{display:flex;align-items:flex-start;gap:20px;background:#fff;border-radius:14px;padding:26px 28px;text-decoration:none;color:inherit;transition:transform .18s,box-shadow .18s;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.nav-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-icon.motion{background:#eef2ff;color:#4f46e5}
.nav-icon.nsfw{background:#fef2f2;color:#dc2626}
.nav-icon svg{width:28px;height:28px}
.nav-body{flex:1;min-width:0}
.nav-body h2{font-size:1.1em;color:#111827;margin-bottom:6px;font-weight:600}
.nav-body p{font-size:.88em;color:#6b7280;line-height:1.6}
.nav-tag{display:inline-block;font-size:.72em;padding:2px 10px;border-radius:20px;margin-top:12px;font-weight:500;letter-spacing:.3px}
.nav-tag.motion{background:#eef2ff;color:#4f46e5}
.nav-tag.nsfw{background:#fef2f2;color:#dc2626}
@media(max-width:480px){
  body{padding:24px 12px}
  .nav-card{padding:20px 18px;gap:14px}
  .nav-icon{width:48px;height:48px;border-radius:12px}
  .header h1{font-size:1.5em}
}
</style>
</head>
<body>
<div class="header">
  <h1>图片分析系统</h1>
  <p>选择需要使用的检测功能</p>
</div>
<div class="nav-list">
  <a class="nav-card" href="/motion">
    <div class="nav-icon motion">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
    </div>
    <div class="nav-body">
      <h2>动态检测</h2>
      <p>上传多张图片，通过感知哈希算法比较相似度，判断图片序列属于静态画面还是动态画面</p>
      <span class="nav-tag motion">图像比对</span>
    </div>
  </a>
  <a class="nav-card" href="/nsfw">
    <div class="nav-icon nsfw">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="nav-body">
      <h2>内容安全检测</h2>
      <p>使用 OpenNSFW2 深度学习模型识别不良内容，支持拦截、复审、放行三级策略，可自定义阈值参数</p>
      <span class="nav-tag nsfw">AI 鉴黄</span>
    </div>
  </a>
</div>
</body>
</html>
