services:
  # 图片分析服务
  image-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-analyzer
    ports:
      - "5000:5000"
    volumes:
      # 挂载配置文件，方便修改阈值（只读）
      - ./config.yaml:/app/config.yaml:ro
      # 挂载模型目录，下载模型后无需重新构建（只读）
      - ./models:/app/models:ro
      # 挂载上传临时目录
      - ./uploads:/tmp/uploads
      # 挂载日志目录，宿主机可直接查看 .log 文件
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - image-analyzer-network

networks:
  image-analyzer-network:
    driver: bridge
